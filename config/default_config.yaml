# Bilibili Video Text Extractor - Default Configuration
# 
# This file contains all available configuration options with their default values.
# Copy this file and modify it to customize the behavior of the extractor.

# ============================================================================
# General Settings
# ============================================================================

# Temporary directory for downloads and intermediate files
temp_dir: "./temp"

# Output directory for extracted text files
output_dir: "./output"

# Log level: DEBUG, INFO, WARNING, ERROR
log_level: "INFO"

# Keep temporary files after processing (useful for debugging)
keep_temp_files: false


# ============================================================================
# Download & Auth Settings
# ============================================================================

# Path to cookie file for accessing premium/member-only content
cookie_file: "tools/BBDown/BBDown.data"

# Auto-login behavior
auto_login: true

# Login type: 'web' or 'tv'
login_type: "web"

# Video quality for download: 480P, 720P, 1080P
video_quality: "720P"

# Number of download threads (used by BBDown)
download_threads: 4


# ============================================================================
# ASR (Automatic Speech Recognition) Settings
# ============================================================================

# ASR engine to use: funasr (recommended for Chinese), whisper (multilingual)
asr_engine: "funasr"

# FunASR model name
# Default: paraformer-zh (optimized for Chinese)
funasr_model: "paraformer-zh"

# FunASR model path (recommended to move large models off C: drive)
funasr_model_path: "D:/Funasr_model"

# Whisper model size: tiny, base, small, medium, large
whisper_model: "base"

# Language code for Whisper (e.g., zh, en, ja)
# Leave as null for automatic detection
language: null

# Use INT8 quantization for FunASR (2-3x speed boost on CPU)
use_int8: false

# Use ONNX Runtime for FunASR (3-4x speed boost on CPU)
use_onnx: false


# ============================================================================
# API Request Settings
# ============================================================================

# API request interval (seconds) to avoid rate limits
api_request_interval: 20

# Max attempts for API retries
api_retry_max_attempts: 3

# Wait time between retries (seconds)
api_retry_wait_time: 20


# ============================================================================
# Output Settings
# ============================================================================

# Output format: srt, json, txt, markdown
output_format: "txt"


# ============================================================================
# Tool Paths (Optional)
# ============================================================================

# If null, the system will attempt to auto-detect from tools/ directory or PATH
bbdown_path: null
ffmpeg_path: null
ffprobe_path: null

