# Bilibili Video Text Extractor - Default Configuration
# 
# This file contains all available configuration options with their default values.
# Copy this file and modify it to customize the behavior of the extractor.
#
# Usage: bilibili-extractor <url> --config your_config.yaml

# ============================================================================
# General Settings
# ============================================================================

# Temporary directory for downloads and intermediate files
temp_dir: "./temp"

# Output directory for extracted text files
output_dir: "./output"

# Log level: DEBUG, INFO, WARNING, ERROR
log_level: "INFO"

# Keep temporary files after processing (useful for debugging)
keep_temp_files: false


# ============================================================================
# Download Settings
# ============================================================================

# Path to cookie file for accessing premium/member-only content
# Leave as null if not needed
cookie_file: null

# Video quality for download: 480P, 720P, 1080P
# Higher quality may improve ASR accuracy but increases download time
video_quality: "720P"

# Number of download threads (used by BBDown)
download_threads: 4


# ============================================================================
# ASR (Automatic Speech Recognition) Settings
# ============================================================================

# ASR engine to use: funasr (recommended for Chinese), whisper (multilingual)
asr_engine: "funasr"

# FunASR model name
# Default: paraformer-zh (optimized for Chinese)
funasr_model: "paraformer-zh"

# Whisper model size: tiny, base, small, medium, large
# Larger models are more accurate but slower
whisper_model: "base"

# Language code for Whisper (e.g., zh, en, ja)
# Leave as null for automatic detection
language: null

# Use INT8 quantization for FunASR (2-3x speed boost on CPU)
# Slightly reduces accuracy (<5%) but significantly faster
use_int8: false

# Use ONNX Runtime for FunASR (3-4x speed boost on CPU)
# Requires ONNX-compatible model
use_onnx: false


# ============================================================================
# OCR (Optical Character Recognition) Settings
# ============================================================================

# Enable OCR for hard subtitles (experimental feature)
enable_ocr: false

# OCR engine: paddleocr, tesseract
ocr_engine: "paddleocr"


# ============================================================================
# Output Settings
# ============================================================================

# Output format: srt, json, txt, markdown
output_format: "txt"


# ============================================================================
# Example Configurations
# ============================================================================

# Example 1: Fast processing with INT8 quantization
# asr_engine: "funasr"
# use_int8: true
# video_quality: "480P"

# Example 2: High accuracy with larger Whisper model
# asr_engine: "whisper"
# whisper_model: "medium"
# language: "zh"

# Example 3: Maximum speed with ONNX Runtime
# asr_engine: "funasr"
# use_onnx: true
# video_quality: "480P"

# Example 4: Premium content access
# cookie_file: "/path/to/cookie.txt"
# video_quality: "1080P"
