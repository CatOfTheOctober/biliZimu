# Bilibili Extractor 配置文件示例
# 复制此文件为 config.yaml 并根据需要修改

# ==================== 通用配置 ====================
# 临时文件目录
temp_dir: "./temp"

# 输出目录
output_dir: "./output"

# 日志级别: DEBUG, INFO, WARNING, ERROR
log_level: "INFO"

# 是否保留临时文件
keep_temp_files: false

# ==================== 工具路径配置 ====================
# BBDown可执行文件路径（可选，留空则自动检测）
# 支持相对路径（相对于项目根目录）或绝对路径
# 自动检测顺序：
#   1. 此配置项指定的路径
#   2. 项目根目录/tools/BBDown/BBDown.exe（推荐）
#   3. 环境变量 BBDOWN_DIR
#   4. 系统PATH
# bbdown_path: "tools/BBDown/BBDown.exe"

# FFmpeg可执行文件路径（可选，留空则自动检测）
# ffmpeg_path: "tools/ffmpeg/bin/ffmpeg.exe"

# FFprobe可执行文件路径（可选，留空则自动检测）
# ffprobe_path: "tools/ffmpeg/bin/ffprobe.exe"

# ==================== BBDown 配置 ====================
# Cookie文件路径（可选，如果不指定会自动检测）
# 自动检测顺序：
#   1. 此配置项指定的路径
#   2. 项目根目录/tools/BBDown/BBDown.data（推荐）
#   3. BBDown.exe所在目录
#   4. 当前工作目录
# cookie_file: "tools/BBDown/BBDown.data"

# 视频质量: 480P, 720P, 1080P
video_quality: "720P"

# 下载线程数
download_threads: 4

# ==================== ASR 配置 ====================
# ASR引擎: funasr, whisper
asr_engine: "funasr"

# FunASR模型名称
funasr_model: "paraformer-zh"

# 使用INT8量化（加速2-3倍）
use_int8: true

# 使用ONNX Runtime（加速3-4倍）
use_onnx: false

# Whisper模型大小: tiny, base, small, medium, large
whisper_model: "base"

# 语言代码（Whisper使用，如: zh, en）
language: null

# ==================== 输出配置 ====================
# 输出格式: srt, json, txt, markdown
output_format: "txt"

# ==================== 高级配置 ====================
# 启用OCR（实验性功能）
enable_ocr: false

# 批处理并发数
batch_concurrency: 3

# 请求超时时间（秒）
request_timeout: 30

# 重试次数
max_retries: 3
